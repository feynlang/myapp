name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/myapp
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: jdk 17 환경 세팅
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradle 셋업
        uses: gradle/actions/setup-gradle@v3

      - name: gradle 권한 부여
        run: chmod +x gradlew

      - name: gradle로 빌드 및 테스트
        run: ./gradlew clean build
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_URL: jdbc:postgresql://localhost:5432/testdb
          DB_USERNAME: testuser
          DB_PASSWORD: testpassword
      
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v4
      
      - name: Docker metadata 추출
        id: meta
        uses: docker/metadata-action@v6
        with: 
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      
      - name: GHCR 로그인
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: test results 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7

  deploy:
    name: Deploy to Azure VM
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: SSH key 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/azure_vm.pem
          chmod 600 ~/.ssh/azure_vm.pem
          ssh-keyscan -H ${{ secrets.AZURE_VM_HOST }} >> ~/.ssh/known_hosts

      - name: VM 배포 디렉터리 준비
        env:
          SSH_USER: ${{ secrets.AZURE_VM_USER }}
          SSH_HOST: ${{ secrets.AZURE_VM_HOST }}
        run: |
          ssh -i ~/.ssh/azure_vm.pem $SSH_USER@$SSH_HOST "mkdir -p ${{ env.DEPLOY_PATH }}"

      - name: VM용 Compose 파일 전송
        env:
          SSH_USER: ${{ secrets.AZURE_VM_USER }}
          SSH_HOST: ${{ secrets.AZURE_VM_HOST }}
        run: |
          scp -i ~/.ssh/azure_vm.pem \
            compose.prod.yaml \
            $SSH_USER@$SSH_HOST:${{ env.DEPLOY_PATH }}/compose.yaml

      - name: VM용 env 파일 생성
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GITHUB_CLIENT_ID: ${{ secrets.APP_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.APP_GITHUB_CLIENT_SECRET }}
          GITHUB_REDIRECT_URI: ${{ secrets.APP_GITHUB_REDIRECT_URI }}
          IMAGE_TAG: latest
        run: |
          {
            printf 'IMAGE_NAME=%s\n' '${{ env.IMAGE_NAME }}'
            printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG"
            printf 'SPRING_PROFILES_ACTIVE=%s\n' 'prod'
            printf 'POSTGRES_DB=%s\n' 'myappdb'
            printf 'POSTGRES_USER=%s\n' 'myapp'
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'GITHUB_CLIENT_ID=%s\n' "$GITHUB_CLIENT_ID"
            printf 'GITHUB_CLIENT_SECRET=%s\n' "$GITHUB_CLIENT_SECRET"
            printf 'GITHUB_REDIRECT_URI=%s\n' "$GITHUB_REDIRECT_URI"
          } > "${{ runner.temp }}/myapp.env"

      - name: VM용 env 파일 검증
        run: |
          if grep -nEv '^[A-Z_][A-Z0-9_]*=.*$' "${{ runner.temp }}/myapp.env"; then
            echo "Generated .env contains invalid lines"
            exit 1
          fi

      - name: VM용 env 파일 전송
        env:
          SSH_USER: ${{ secrets.AZURE_VM_USER }}
          SSH_HOST: ${{ secrets.AZURE_VM_HOST }}
        run: |
          scp -i ~/.ssh/azure_vm.pem \
            "${{ runner.temp }}/myapp.env" \
            $SSH_USER@$SSH_HOST:${{ env.DEPLOY_PATH }}/.env

      - name: 배포 및 헬스체크
        env:
          SSH_USER: ${{ secrets.AZURE_VM_USER }}
          SSH_HOST: ${{ secrets.AZURE_VM_HOST }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          ssh -i ~/.ssh/azure_vm.pem $SSH_USER@$SSH_HOST <<EOF
            set -e

            cd ${{ env.DEPLOY_PATH }}

            docker compose config >/dev/null

            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            docker compose pull
            docker compose up -d

            APP_READY=0

            for i in {1..150}; do
              STATUS=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health || true)
              if [ "\$STATUS" = "200" ]; then
                echo 'Health check passed'
                APP_READY=1
                break
              fi
              echo "Waiting for app... (\$i/150, status=\$STATUS)"
              sleep 3
            done

            if [ "\$APP_READY" != "1" ]; then
              echo 'Health check failed'
              docker compose ps
              docker compose logs app --tail=100
              exit 1
            fi
          EOF

      - name: SSH key 정리
        if: always()
        run: rm -f ~/.ssh/azure_vm.pem
