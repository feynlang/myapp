spring:
  application:
    name: myapp

  datasource: 
    url: jdbc:h2:~/_feynlang/local
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  h2:
    console:
      enabled: true

  security:
    oauth2:
      client:
        registration:
          github:
            scope:
              - read:user
              - user:email

server:
  port: 8080
  forward-headers-strategy: native